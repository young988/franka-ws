openvla_planner:
  ros__parameters:
    # VLA server
    server_url: http://127.0.0.1:8000/act
    instruction: move the object
    unnorm_key: bridge_orig

    # Topics
    image_topic: /camera/camera/color/image_raw

    # Frames
    command_frame: fr3_link0
    tcp_frame: fr3_hand_tcp
    move_group_name: fr3_arm

    # Control
    control_frequency: 10.0
    request_timeout_sec: 10.0
    image_timeout_sec: 2.0
    settle_delay_sec: 0.3        # extra delay after plan completion before inference resumes

    # Delta limits (per VLA inference step, in TCP frame)
    max_linear_step: 0.05       # m — clip position delta
    max_angular_step: 0.25      # rad — clip rotation delta
    max_workspace_radius: 0.85  # m — reject targets too far from base

    # Planning
    planning_time: 2.0          # seconds allowed per plan
    planning_attempts: 1        # attempts per request
    velocity_scaling: 0.3       # 0–1
    acceleration_scaling: 0.3   # 0–1
    position_tolerance: 0.01    # m — goal region half-size
    orientation_tolerance: 0.1  # rad — goal region

    # Gripper
    gripper_threshold: 0.0
    gripper_debounce_sec: 1.0
    gripper_open_width: 0.08
    gripper_speed: 0.05
    grasp_width: 0.03
    grasp_epsilon: 0.01
    grasp_speed: 0.03
    grasp_force: 30.0
    move_gripper_action: /franka_gripper/move
    grasp_action: /franka_gripper/grasp
