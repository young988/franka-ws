openvla_servo:
  ros__parameters:
    server_url: http://127.0.0.1:8000/act
    instruction: move the object
    unnorm_key: bridge_orig
    image_topic: /camera/camera/color/image_raw
    twist_topic: /servo_node/delta_twist_cmds
    command_frame: fr3_link0
    control_frequency: 5.0
    request_timeout_sec: 10.0
    image_timeout_sec: 2.0
    # Velocity limits — hard safety ceiling on twist output
    max_linear_velocity: 0.10
    max_angular_velocity: 0.50
    # Step limits — match bridge_orig action range (q01–q99)
    #   dx/dy/dz: ±28–41 mm  →  clip at 0.05 m (passes ~98% of valid actions)
    #   dRx/dRy/dRz: ±0.08–0.21 rad  →  clip at 0.25 rad
    max_linear_step: 0.05
    max_angular_step: 0.25
    smoothing_alpha: 0.3
    # Gripper: bridge_orig uses normalized [-1,+1] (mask=False).
    #   +1.0 = close, -1.0 = open  (or vice versa — verify on robot).
    #   Threshold 0.0 = "close if action > 0".
    gripper_threshold: 0.0
    gripper_debounce_sec: 1.0
    gripper_open_width: 0.08
    gripper_speed: 0.05
    grasp_width: 0.03
    grasp_epsilon: 0.01
    grasp_speed: 0.03
    grasp_force: 30.0
    move_gripper_action: /franka_gripper/move
    grasp_action: /franka_gripper/grasp
