franka_policy_runtime:
  ros__parameters:
    mode: single_step
    policy_url: http://127.0.0.1:8000/act
    instruction: pick up the red cube
    instruction_topic: ~/instruction
    unnorm_key: bridge_orig
    image_topic: /eye_to_hand_camera/eye_to_hand_camera/color/image_raw
    wrist_image_topic: /eye_in_hand_camera/eye_in_hand_camera/color/image_raw
    depth_topic: /eye_to_hand_camera/eye_to_hand_camera/aligned_depth_to_color/image_raw
    camera_info_topic: /eye_to_hand_camera/eye_to_hand_camera/color/camera_info
    object_pose_provider: none
    object_target_color: red
    object_camera_frame: eye_to_hand_camera_color_optical_frame
    object_min_pixels: 30
    joint_state_topic: /joint_states
    cartesian_command_topic: /franka_cartesian_pose_controller/reference
    command_frame: fr3_link0
    policy_tcp_frame: fr3_hand_tcp
    franka_ee_frame: fr3_hand_tcp
    control_period_sec: 0.5
    actions_per_chunk: 1
    chunk_size_threshold: 0.5
    fusion_new_weight: 0.6
    action_scale: 0.5
    max_translation_step_per_tick: 0.01
    max_rotation_step_per_tick: 0.1
    pose_sync_reset_threshold: 0.05
    gripper_move_action: /franka_gripper/move
    gripper_min_width: 0.0
    gripper_max_width: 0.08
    gripper_initial_width: 0.04
    gripper_speed: 0.05
    gripper_deadband: 0.002
    joint_names:
      - fr3_joint1
      - fr3_joint2
      - fr3_joint3
      - fr3_joint4
      - fr3_joint5
      - fr3_joint6
      - fr3_joint7
