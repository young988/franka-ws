# ros2_control configuration for FR3 arm.
# Uses joint_trajectory_controller with effort interface and PID gains
# matching the MoveIt franka_fr3_moveit_config (fr3_ros_controllers.yaml).

/**:
  controller_manager:
    ros__parameters:
      update_rate: 1000
      thread_priority: 98

      joint_state_broadcaster:
        type: joint_state_broadcaster/JointStateBroadcaster

      joint_trajectory_controller:
        type: joint_trajectory_controller/JointTrajectoryController

      franka_robot_state_broadcaster:
        type: franka_robot_state_broadcaster/FrankaRobotStateBroadcaster

/**:
  joint_trajectory_controller:
    ros__parameters:
      joints:
        - fr3_joint1
        - fr3_joint2
        - fr3_joint3
        - fr3_joint4
        - fr3_joint5
        - fr3_joint6
        - fr3_joint7
      command_interfaces:
        - effort
      state_interfaces:
        - position
        - velocity
      allow_partial_joints_goal: false
      gains:
        fr3_joint1: {p: 600.0, d: 30.0, i: 0.0, i_clamp: 1.0}
        fr3_joint2: {p: 600.0, d: 30.0, i: 0.0, i_clamp: 1.0}
        fr3_joint3: {p: 600.0, d: 30.0, i: 0.0, i_clamp: 1.0}
        fr3_joint4: {p: 600.0, d: 30.0, i: 0.0, i_clamp: 1.0}
        fr3_joint5: {p: 250.0, d: 10.0, i: 0.0, i_clamp: 1.0}
        fr3_joint6: {p: 150.0, d: 10.0, i: 0.0, i_clamp: 1.0}
        fr3_joint7: {p:  50.0, d:  5.0, i: 0.0, i_clamp: 1.0}
      constraints:
        stopped_velocity_tolerance: 0.05
        goal_time: 2.0
